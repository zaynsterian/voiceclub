name: Build and Release VoiceClub Windows Installer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Patch updater config for this repository
        shell: pwsh
        env:
          TAURI_PUBLIC_KEY: ${{ secrets.TAURI_PUBLIC_KEY }}
          UPDATE_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_PUBLIC_KEY)) {
            throw "Missing TAURI_PUBLIC_KEY GitHub secret. Add the public key generated by `npm run tauri signer generate`."
          }

          $configPath = "src-tauri/tauri.conf.json"
          $config = Get-Content $configPath -Raw
          $config = $config.Replace("__VOICECLUB_UPDATER_PUBLIC_KEY__", $env:TAURI_PUBLIC_KEY)
          $config = $config.Replace("__VOICECLUB_UPDATE_ENDPOINT__", $env:UPDATE_ENDPOINT)
          Set-Content -Path $configPath -Value $config -NoNewline

      - name: Build and upload GitHub release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: voiceclub-v__VERSION__
          releaseName: VoiceClub v__VERSION__
          releaseBody: |
            VoiceClub Windows release.

            The updater checks GitHub Releases once when the app launches.
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
